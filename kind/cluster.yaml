kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: traefik-lab
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8080
        listenAddress: "0.0.0.0"
        protocol: TCP
      - containerPort: 30443
        hostPort: 8443
        listenAddress: "0.0.0.0"
        protocol: TCP
